    <script>

    function tocarMusica(musica) {
    const audio = musica.querySelector('audio');
    const todasAsMusicas = document.querySelectorAll('audio');
    todasAsMusicas.forEach(m => {
        if (m !== audio) m.pause();
    });

    if (audio.paused) {
        audio.play();
    } else {
        audio.pause();
    }
}
    </script>
